name: Test — Full Suite, Docker Push & Deploy

on:
  push:
    branches: [test]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-booking
  AWS_REGION: eu-west-1
  ECS_CLUSTER: ticket-booking-test

jobs:
  full-test-suite:
    name: Full Test Suite (unit + integration + Pact)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop123
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run full test suite
        run: mvn verify -B -Dspring.profiles.active=dev

      - name: Run Pact consumer tests (generate pact files)
        run: mvn -pl booking-service test -B -Dtest=BookingPaymentPactConsumerTest

      - name: Run Pact provider verification
        run: mvn -pl payment-service test -B -Dtest=PaymentPactProviderTest

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-test
          path: '**/target/site/jacoco/'

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: '**/target/pacts/'

  docker-build-push:
    name: Build & Push Docker Images (test tag)
    needs: full-test-suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [show-service, booking-service, payment-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:test
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    name: Deploy to AWS ECS (test)
    needs: docker-build-push
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [show-service, booking-service, payment-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/${{ matrix.service }}-task.json
          container-name: ${{ matrix.service }}
          image: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:test-${{ github.sha }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.service }}-test
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
