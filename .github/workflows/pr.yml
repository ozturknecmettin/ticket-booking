name: PR — Build, Unit Tests & Coverage

on:
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    name: Build + Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build & run unit tests
        run: mvn verify -B -Dspring.profiles.active=dev

      - name: Check coverage thresholds
        # JaCoCo check goal is bound to verify phase; failure here means coverage < 80%
        run: echo "Coverage check passed (enforced by JaCoCo in verify phase above)"

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Upload Pact files (consumer)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-files
          path: '**/target/pacts/'
          retention-days: 7

      - name: Comment PR with test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
