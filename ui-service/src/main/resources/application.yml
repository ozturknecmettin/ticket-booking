server:
  port: 8080

spring:
  application:
    name: ui-service
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:uidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

services:
  show-url: http://localhost:8081
  booking-url: http://localhost:8082
  booking-query-url: http://localhost:8085
  payment-url: http://localhost:8083
  notification-url: http://localhost:8084

jwt:
  secret: ticket-booking-demo-secret-key-must-be-at-least-256-bits-long
  expiration-ms: 3600000

app:
  allowed-origins: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.workshop: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        # 4xx errors from downstream are valid responses, not failures
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
    instances:
      show-service:
        base-config: default
      booking-service:
        base-config: default
      booking-query-service:
        base-config: default
      payment-service:
        base-config: default
      notification-service:
        base-config: default
