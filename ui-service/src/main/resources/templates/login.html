<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>TicketBox — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --accent: #f59e0b;
            --bg: #06060f;
            --surface: rgba(13,13,30,0.92);
            --border: rgba(255,255,255,0.07);
            --text: #e2e8f0;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            color: var(--text);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 15% 50%, rgba(124,58,237,.10) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 85% 20%, rgba(245,158,11,.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 60% 80%, rgba(37,99,235,.06) 0%, transparent 60%);
            pointer-events: none;
        }
        .auth-wrap {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #92400e, #f59e0b);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; margin-bottom: .75rem;
            box-shadow: 0 8px 32px rgba(245,158,11,.3);
        }
        .brand-name { font-size: 1.75rem; font-weight: 700; color: #fff; letter-spacing: -.5px; display: block; }
        .brand-name span { color: var(--accent); }
        .brand-tagline { font-size: .85rem; color: var(--text-muted); margin-top: .25rem; }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 80px rgba(0,0,0,.5);
        }
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,.04);
            border-radius: 10px;
            padding: 3px; margin-bottom: 1.75rem; gap: 3px;
        }
        .auth-tab {
            flex: 1; text-align: center; padding: .5rem; border-radius: 8px;
            font-size: .875rem; font-weight: 500; cursor: pointer;
            color: var(--text-muted); transition: all .2s; user-select: none;
        }
        .auth-tab.active { background: rgba(245,158,11,.15); color: var(--accent); }
        .form-label {
            font-size: .78rem; font-weight: 500; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: .4rem;
        }
        .form-control, .form-select {
            background: rgba(255,255,255,.04) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 10px !important;
            padding: .65rem .9rem !important;
            font-size: .9rem !important;
            transition: border-color .2s, box-shadow .2s !important;
            font-family: 'Inter', sans-serif !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(245,158,11,.12) !important;
            background: rgba(255,255,255,.06) !important;
        }
        .form-control::placeholder { color: var(--text-muted) !important; }
        .form-select option { background: #1a1a2e; color: var(--text); }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .bi {
            position: absolute; left: .85rem; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
            font-size: .9rem; pointer-events: none;
        }
        .input-icon-wrap .form-control { padding-left: 2.4rem !important; }
        .btn-auth {
            width: 100%; padding: .75rem; border-radius: 10px;
            font-weight: 600; font-size: .9rem;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            border: none; color: #000; letter-spacing: .3px;
            transition: all .2s; box-shadow: 0 4px 16px rgba(245,158,11,.25);
            font-family: 'Inter', sans-serif;
        }
        .btn-auth:hover {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            box-shadow: 0 6px 24px rgba(245,158,11,.4);
            transform: translateY(-1px);
        }
        .btn-auth:active { transform: translateY(0); }
        .btn-auth:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .auth-error {
            display: none;
            background: rgba(220,38,38,.12); border: 1px solid rgba(220,38,38,.3);
            border-radius: 8px; padding: .6rem .9rem; font-size: .825rem;
            color: #fca5a5; margin-bottom: 1rem;
        }
        .auth-error.show { display: block; }
        .feature-chips { display: flex; justify-content: center; gap: .75rem; margin-top: 1.75rem; flex-wrap: wrap; }
        .feature-chip { font-size: .75rem; color: var(--text-muted); display: flex; align-items: center; gap: .3rem; }
        .feature-chip .bi { color: var(--accent); font-size: .8rem; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="brand">
        <div class="brand-icon">🎟️</div>
        <span class="brand-name">Ticket<span>Box</span></span>
        <div class="brand-tagline">Your premium event experience</div>
    </div>
    <div class="auth-card">
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
        </div>
        <div class="auth-error" id="auth-error"></div>
        <!-- Login -->
        <div id="form-login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" class="form-control" id="login-username" placeholder="Enter your username" autocomplete="username"/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" class="form-control" id="login-password" placeholder="Enter your password" autocomplete="current-password"/>
                </div>
            </div>
            <button class="btn-auth" id="btn-login" onclick="doLogin()">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </div>
        <!-- Register -->
        <div id="form-register" style="display:none">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person-badge"></i>
                    <input type="text" class="form-control" id="reg-fullname" placeholder="First and last name" autocomplete="name"/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-at"></i>
                    <input type="text" class="form-control" id="reg-username" placeholder="Choose a username" autocomplete="username"/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" class="form-control" id="reg-password" placeholder="Choose a password" autocomplete="new-password"/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Account Type</label>
                <select class="form-select" id="reg-role">
                    <option value="CUSTOMER">Customer</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button class="btn-auth" id="btn-register" onclick="doRegister()">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </div>
    </div>
    <div class="feature-chips">
        <span class="feature-chip"><i class="bi bi-shield-check"></i> Secure JWT Auth</span>
        <span class="feature-chip"><i class="bi bi-lightning-charge"></i> Real-time SSE</span>
        <span class="feature-chip"><i class="bi bi-diagram-3"></i> CQRS / Saga</span>
    </div>
</div>
<script>
const TOKEN_KEY = 'tb_token';
if (localStorage.getItem(TOKEN_KEY)) window.location.replace('/');

function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    clearError();
}
function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.classList.add('show');
}
function clearError() { document.getElementById('auth-error').classList.remove('show'); }

async function post(url, body) {
    const res = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
}
function onSuccess(data) {
    localStorage.setItem(TOKEN_KEY, data.token);
    window.location.replace('/');
}
async function doLogin() {
    clearError();
    const btn = document.getElementById('btn-login');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showError('Please enter username and password.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
    try { onSuccess(await post('/auth/login', { username, password })); }
    catch (e) {
        showError(e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
    }
}
async function doRegister() {
    clearError();
    const btn      = document.getElementById('btn-register');
    const fullName = document.getElementById('reg-fullname').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const role     = document.getElementById('reg-role').value;
    if (!fullName || !username || !password) { showError('Please fill in all fields.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account…';
    try { onSuccess(await post('/auth/register', { fullName, username, password, role })); }
    catch (e) {
        showError(e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Create Account';
    }
}
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('form-login').style.display !== 'none') doLogin(); else doRegister();
});
</script>
</body>
</html>
