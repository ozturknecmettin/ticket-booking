version: "3.9"

services:

  # ── Axon Server ──────────────────────────────────────────────────────────────
  axon-server:
    image: axoniq/axonserver:latest
    container_name: axon-server
    ports:
      - "8024:8024"   # Dashboard UI
      - "8124:8124"   # gRPC (services connect here)
    volumes:
      - axonserver_data:/axonserver/data
      - axonserver_events:/axonserver/events
      - axonserver_config:/axonserver/config
    environment:
      AXONIQ_AXONSERVER_STANDALONE: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8024/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ticket-network

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ticket-postgres
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop123
      POSTGRES_MULTIPLE_DATABASES: showdb,bookingdb,paymentdb,notificationdb,uidb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket-network

  # ── Show Service ─────────────────────────────────────────────────────────────
  show-service:
    build:
      context: .
      dockerfile: show-service/Dockerfile
    container_name: show-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: showdb
      DB_USERNAME: workshop
      DB_PASSWORD: workshop123
      AXON_SERVER_HOST: axon-server
      AXON_SERVER_PORT: 8124
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      axon-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ticket-network

  # ── Booking Service ──────────────────────────────────────────────────────────
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bookingdb
      DB_USERNAME: workshop
      DB_PASSWORD: workshop123
      AXON_SERVER_HOST: axon-server
      AXON_SERVER_PORT: 8124
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      axon-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ticket-network

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: paymentdb
      DB_USERNAME: workshop
      DB_PASSWORD: workshop123
      AXON_SERVER_HOST: axon-server
      AXON_SERVER_PORT: 8124
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      axon-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ticket-network

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notificationdb
      DB_USERNAME: workshop
      DB_PASSWORD: workshop123
      AXON_SERVER_HOST: axon-server
      AXON_SERVER_PORT: 8124
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_STARTTLS: "false"
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@ticketbooking.local}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      axon-server:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ticket-network

  # ── UI Service ───────────────────────────────────────────────────────────────
  ui-service:
    build:
      context: .
      dockerfile: ui-service/Dockerfile
    container_name: ui-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: uidb
      DB_USERNAME: workshop
      DB_PASSWORD: workshop123
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-at-least-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      SHOW_SERVICE_URL: http://show-service:8081
      BOOKING_SERVICE_URL: http://booking-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      show-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ticket-network

  # ── Zipkin (distributed tracing) ────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - ticket-network

  # ── Prometheus (metrics scraping) ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - ticket-network

  # ── Grafana (metrics dashboards) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - ticket-network

  # ── MailHog (local SMTP catch-all for dev/demo) ──────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "2025:1025"   # SMTP (host:2025 → container:1025; macOS uses 1025 internally)
      - "8025:8025"   # Web UI — open http://localhost:8025 to view captured emails
    networks:
      - ticket-network

volumes:
  postgres_data:
  axonserver_data:
  axonserver_events:
  axonserver_config:
  prometheus_data:
  grafana_data:

networks:
  ticket-network:
    driver: bridge
