server:
  shutdown: graceful
  port: 8084

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  application:
    name: notification-service
  datasource:
    url: jdbc:h2:file:./data/notificationdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    locations: classpath:db/migration
    enabled: true
  mail:
    host: localhost
    port: 1025   # MailHog / smtp4dev when running locally
    test-connection: false
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

axon:
  axonserver:
    servers: localhost:8124
    enabled: true
  serializer:
    general: jackson
    events: jackson
    messages: jackson

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  health:
    mail:
      enabled: true

notification:
  email:
    enabled: true          # enable with SMTP server (e.g. MailHog via Docker)
    from: noreply@ticketbooking.local

logging:
  level:
    com.workshop: DEBUG
    org.axonframework: WARN
